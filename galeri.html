
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Galeri Sederhana</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
    }

    h2 {
      margin-top: 20px;
    }

    .galeri {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .item {
      width: 120px;
      height: 120px;
      background: white;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<h2>Galeri</h2>

<div class="galeri">
  <div class="item">📷</div>
  <div class="item">🌄</div>
  <div class="item">🎨</div>
</div>

</body>
</html>
