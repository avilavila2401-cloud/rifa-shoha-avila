<!DOCTYPE html>
<html lang="id">
<head>

    <title>Tabel Kehadiran</title>

        body {
            font-family: Arial, sans-serif;
        }
        table {
            border-collapse: collapse;
            width: 50%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    </tr>
    <tr>
        <td>1</td>

        <td>Hadir</td>
    </tr>
    <tr>
        <td>2</td>
        <td>Avila</td>
        <td>Hadir</td>
    </tr>
    <tr>
        <td>3</td>

    </tr>
</table>

</body>
</html>
